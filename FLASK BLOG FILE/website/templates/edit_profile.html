{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 card shadow border-0 p-4">
        <h3 class="text-center fw-bold mb-4">Update Profile</h3>
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label fw-bold">Update Bio</label>
                <textarea name="bio" class="form-control">{{ user.bio }}</textarea>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Change Profile Picture</label>
                <input type="file" name="profile_pic" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold rounded-pill">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
