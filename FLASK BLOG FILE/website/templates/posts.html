{% extends "base.html" %}
{% block title %}Posts of {{ username }}{% endblock %}
{% block content %}
<h2 class="text-center">Posts by {{ username }}</h2>
{% for post in posts %}
<div class="card mb-3 border-dark">
  <div class="card-body">
    <p>{{ post.text }}</p>
    {% if post.image %}
    <img src="{{ url_for('static', filename='uploads/' + post.image) }}" class="img-fluid mb-2"/>
    {% endif %}
  </div>
</div>
{% endfor %}
{% endblock %}
