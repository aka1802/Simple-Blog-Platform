<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <title>{% block title %}SocialNet{% endblock %}</title>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
      <div class="container">
        <a class="navbar-brand font-weight-bold" href="/">SocialNet</a>
        <div class="collapse navbar-collapse" id="navbar">
          <form class="form-inline mx-auto" action="/home" method="GET">
            <input class="form-control form-control-sm rounded-pill px-3" 
                   type="search" name="search" 
                   placeholder="Search by username..." 
                   value="{{ search_query if search_query else '' }}">
          </form>
          <div class="navbar-nav ml-auto">
            {% if user.is_authenticated %}
            <a class="nav-item nav-link" href="{{ url_for('views.create_post') }}">Create Post</a>
            <a class="nav-item nav-link" href="/profile/{{ user.username }}">@{{ user.username }}</a>
            <a class="nav-item nav-link text-danger" href="/logout">Logout</a>
            {% else %}
            <a class="nav-item nav-link" href="/login">Login</a>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>
    <div class="container mt-4">{% block content %}{% endblock %}</div>
    <script src="{{ url_for('static', filename='index.js') }}"></script>
  </body>
</html>
